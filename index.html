<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campus Wi-Fi Prayer</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Georgia, serif; background:#0b1020; color:#dce6ff; text-align:center; padding:1rem; }
    h1 { font-weight:500; }
    #prayer { max-width:28rem; font-size:1.25rem; line-height:1.5; min-height:4.5rem; }
    button { margin-top:1.25rem; background:#243056; color:#fff; border:1px solid #3a4a7a; border-radius:999px; padding:0.55rem 1.1rem; cursor:pointer; font-family:system-ui,sans-serif; }
  </style>
</head>
<body>
  <main>
    <h1>Campus Wi-Fi Prayer</h1>
    <p id="prayer"></p>
    <button id="next">Another prayer</button>
  </main>
  <script>
    const lines = [
      "May the captive portal remember me this time.",
      "May the signal bars be honest and plentiful.",
      "May the upload finish before the lecture ends.",
      "May DHCP grant a lease without drama.",
      "May Zoom not freeze mid-sentence.",
      "May the VPN and the campus firewall find peace.",
      "May 'connected, no internet' become a myth.",
      "May the password still be written on the whiteboard."
    ];
    const el = document.getElementById('prayer');
    function show(){ el.textContent = lines[Math.floor(Math.random()*lines.length)]; }
    document.getElementById('next').onclick = show;
    show();
  </script>
</body>
</html>
